<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — Página no encontrada | Beyritech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Raleway:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" />
    <link rel="icon" type="image/webp" href="/logo/beyritech-logo.webp" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #050505;
        color: #e0e0e0;
        font-family: 'Lato', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 480px;
      }
      .logo {
        height: 40px;
        opacity: 0.7;
        margin-bottom: 3rem;
      }
      .code {
        font-family: 'JetBrains Mono', monospace;
        font-size: 7rem;
        font-weight: 700;
        color: #FEC934;
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      .line {
        width: 4rem;
        height: 2px;
        background: #FEC934;
        margin: 1.5rem auto;
        opacity: 0.5;
      }
      h1 {
        font-family: 'Raleway', sans-serif;
        font-size: 1.2rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #ffffff;
        margin-bottom: 1rem;
      }
      p {
        font-size: 0.9rem;
        font-weight: 300;
        color: #909090;
        line-height: 1.6;
        margin-bottom: 2.5rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.8rem 2rem;
        background: #FEC934;
        color: #050505;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        text-decoration: none;
        letter-spacing: 1px;
        border-radius: 4px;
        transition: all 0.3s ease;
      }
      .btn:hover {
        background: #ffd75e;
        transform: scale(1.02);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img class="logo" src="/logo/beyritech-logo.webp" alt="Beyritech" />
      <div class="code">404</div>
      <div class="line"></div>
      <h1>Página no encontrada</h1>
      <p>La ruta solicitada no existe o ha sido movida. Verifique la dirección o vuelva al inicio.</p>
      <a class="btn" href="/">← Volver al inicio</a>
    </div>
  </body>
</html>
